<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Librería HTML</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="./css/styles.css" rel="stylesheet">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg navbar-dark py-2">
            <div class="container-fluid">
                <a class="navbar-brand d-flex align-items-center" href="./index.html">
                    <img src="./img/logo.svg" alt="Logo" width="80" height="80" class="logo-svg">
                </a>
                <a class="navbar-brand fs-1" href="./index.html">Librería</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav mx-auto">
                        <li class="nav-item">
                            <a class="nav-link fs-4" href="./index.html">INICIO</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link fs-4" href="./catalogo.html">CATALOGO</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active fs-4" href="./contacto.html">CONTACTO</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5 pt-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow-lg border-0 p-4">
                    <h2 class="text-center mb-4">Contáctanos</h2>
                    <p class="text-center text-muted mb-4">Completa el formulario y te responderemos a la brevedad.</p>

                    <form action="#" method="POST">
                        <div class="mb-3">
                            <label for="nombre" class="form-label fw-bold">Nombre</label>
                            <input type="text" class="form-control" id="nombre" name="nombre"
                                placeholder="Ingresa tu nombre completo" required>
                        </div>

                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" id="email" name="email"
                                placeholder="nombre@ejemplo.com" required>
                        </div>

                        <div class="mb-3">
                            <label for="asunto" class="form-label fw-bold">Asunto</label>
                            <select class="form-select" id="asunto" name="asunto" required>
                                <option value="" selected disabled>Selecciona una opción</option>
                                <option value="consulta">Consulta</option>
                                <option value="reclamo">Reclamo</option>
                                <option value="sugerencia">Sugerencia</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label for="mensaje" class="form-label fw-bold">Mensaje</label>
                            <textarea class="form-control" id="mensaje" name="mensaje" rows="5"
                                placeholder="Escribe tu mensaje aquí..." required></textarea>
                        </div>

                        <div class="d-grid mt-4">
                            <button type="button" class="btn btn-primary btn-lg shadow-sm">
                                Enviar Mensaje
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
