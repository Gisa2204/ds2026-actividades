<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>Página JS</title>
    <link rel='stylesheet' href='../css/style.css'>
    <link rel="icon" href="../images/logo.png">
</head>
<body>

    <header>
        <nav class="shopping-bar">
            <h1>Catálogo</h1>
            <input type="search" id="filtroAutor-input" placeholder="Ingrese un autor">
            <button id="filtrar-button">Filtrar</button>
            <button id="todos-button">Mostrar todos</button>
            <button id="disponibles-button">Mostrar disponibles</button>
        </nav>
        <details class="libros-bar">
            <summary>Agregar libro al catálogo</summary>
            <hr>
            <form id="libros-form">
                <input type="search" id="titulo-input" placeholder="Título del libro">
                <input type="search" id="autor-input" placeholder="Autor del libro">
                <input type="search" id="precio-input" placeholder="Precio del libro">
                <input type="search" id="genero-input" placeholder="Género (puede no ir)">
                <div class="checkBox">
                    <h2>Disponible:</h2>
                    <input type="checkbox" id="disponible-input">
                </div>
                <button type="submit" id="agregar-button">Agregar</button>
            </form>
            <div id="errorForm-div"></div>
        </details>
    </header>

    <main>
        <section class="catalogo">
            <section class="container">
                <h1>LISTADO</h1>
                <hr>
                <ul id="compra-list" class="container-compra">
                    <!--En esta zona se agregan los items-->
                </ul>
            </section>
            <p id="stats"></p>
        <section>
    </main>

    <footer>
    </footer>
    <script type="module" src="js/app.js"></script>
</body>
</html>
